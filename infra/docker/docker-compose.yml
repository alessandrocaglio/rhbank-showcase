version: "3.9"

networks:
  showcase-net:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # Keycloak — Identity Provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./payment-realm.json:/opt/keycloak/data/import/BankDemoRealm-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/BankDemoRealm HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -q realm"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - showcase-net

  # ---------------------------------------------------------------------------
  # PostgreSQL — Shared relational database host
  # ---------------------------------------------------------------------------
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - showcase-net

  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible event streaming
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.io/redpandadata/redpanda:latest-fips
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      # INTERNAL listener: container-to-container
      # EXTERNAL listener: host-to-container (smoke tests, debugging)
      - --kafka-addr
      - INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:29092,EXTERNAL://localhost:9092
      - --schema-registry-addr
      - http://0.0.0.0:8081
      - --pandaproxy-addr
      - http://0.0.0.0:8082
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "9092:9092"
      - "8081:8081"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - showcase-net

  # ---------------------------------------------------------------------------
  # redpanda-init — One-shot topic creation job
  # ---------------------------------------------------------------------------
  redpanda-init:
    image: docker.io/redpandadata/redpanda:latest-fips
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: >
      bash -c "
        rpk topic create payment-approved --partitions 3 --replicas 1 --brokers redpanda:29092;
        rpk topic create payment-completed --partitions 3 --replicas 1 --brokers redpanda:29092;
        rpk topic create payment-approved.DLT --partitions 1 --replicas 1 --brokers redpanda:29092;
        rpk topic create payment-completed.DLT --partitions 1 --replicas 1 --brokers redpanda:29092;
      "
    restart: "no"
    networks:
      - showcase-net

  # ---------------------------------------------------------------------------
  # IBM MQ — Enterprise JMS message broker
  # ---------------------------------------------------------------------------
  ibmmq:
    image: icr.io/ibm-messaging/mq:9.3.5.1-r2
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: QM1
      MQ_ADMIN_PASSWORD: admin
    ports:
      - "1414:1414"
      - "9443:9443"
    volumes:
      - ./config.mqsc:/etc/mqm/config.mqsc:ro
      - ibmmq-data:/mnt/mqm
    healthcheck:
      test: ["CMD", "dspmq", "-m", "QM1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - showcase-net

  # ---------------------------------------------------------------------------
  # account-verifier — Quarkus gRPC server + Kafka producer
  # ---------------------------------------------------------------------------
  account-verifier:
    build:
      context: ../../apps/account-verifier
      dockerfile: Dockerfile
    image: showcase/account-verifier:latest
    environment:
      QUARKUS_HTTP_PORT: "8080"
      QUARKUS_GRPC_SERVER_PORT: "9090"
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/accounts_db
      QUARKUS_DATASOURCE_USERNAME: appuser
      QUARKUS_DATASOURCE_PASSWORD: apppassword
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    ports:
      - "8085:8080"   # HTTP health / metrics
      - "9090:9090"   # gRPC
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/live"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - showcase-net

  # ---------------------------------------------------------------------------
  # transaction-engine — Spring Boot Kafka consumer + IBM MQ producer
  # ---------------------------------------------------------------------------
  transaction-engine:
    build:
      context: ../../apps/transaction-engine
      dockerfile: Dockerfile
    image: showcase/transaction-engine:latest
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ledger_db
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppassword
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      IBM_MQ_CONN_NAME: ibmmq(1414)
      IBM_MQ_QUEUE_MANAGER: QM1
      IBM_MQ_CHANNEL: DEV.APP.SVRCONN
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      ibmmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - showcase-net

  # ---------------------------------------------------------------------------
  # clearing-house — Quarkus IBM MQ consumer + Kafka producer
  # ---------------------------------------------------------------------------
  clearing-house:
    build:
      context: ../../apps/clearing-house
      dockerfile: Dockerfile
    image: showcase/clearing-house:latest
    environment:
      QUARKUS_HTTP_PORT: "8080"
      IBM_MQ_HOST: ibmmq
      IBM_MQ_PORT: "1414"
      IBM_MQ_QUEUE_MANAGER: QM1
      IBM_MQ_CHANNEL: DEV.APP.SVRCONN
      IBM_MQ_QUEUE_NAME: DEV.QUEUE.CLEARING
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
    ports:
      - "8083:8080"   # Quarkus health
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      ibmmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/live"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - showcase-net

  # ---------------------------------------------------------------------------
  # payment-gateway — Spring Boot edge API (gRPC client, Kafka, SSE)
  # ---------------------------------------------------------------------------
  payment-gateway:
    build:
      context: ../../apps/payment-gateway
      dockerfile: Dockerfile
    image: showcase/payment-gateway:latest
    environment:
      SERVER_PORT: "8090"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      GRPC_CLIENT_ACCOUNT_VERIFIER_ADDRESS: static://account-verifier:9090
    ports:
      - "8090:8090"
    depends_on:
      keycloak:
        condition: service_healthy
      account-verifier:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - showcase-net

  # ---------------------------------------------------------------------------
  # spa-mobile-app — Vue 3 frontend served by Nginx
  # ---------------------------------------------------------------------------
  spa-mobile-app:
    build:
      context: ../../apps/spa-mobile-app
      dockerfile: Dockerfile
    image: showcase/spa-mobile-app:latest
    environment:
      # These are browser-visible URLs (resolved by the user's browser, not by containers)
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: BankDemoRealm
      KEYCLOAK_CLIENT_ID: spa-payment-client
      API_BASE_URL: http://localhost:8090
    ports:
      - "3000:8080"
    depends_on:
      payment-gateway:
        condition: service_healthy
    networks:
      - showcase-net

volumes:
  postgres-data:
  redpanda-data:
  ibmmq-data:
