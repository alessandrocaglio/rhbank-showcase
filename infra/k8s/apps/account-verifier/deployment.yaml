apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-verifier
  namespace: showcase
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-verifier
  template:
    metadata:
      labels:
        app: account-verifier
      annotations:
        instrumentation.opentelemetry.io/inject-java: "true"
    spec:
      containers:
        - name: account-verifier
          image: quay.io/acaglio/account-verifier:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 9090
            - name: http
              containerPort: 8080
          env:
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgres:5432/accounts_db"
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-app-secret
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-app-secret
                  key: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "redpanda:9092"
            - name: QUARKUS_GRPC_SERVER_PORT
              value: "9090"
            - name: QUARKUS_HTTP_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
