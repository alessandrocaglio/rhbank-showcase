apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keycloak
  namespace: showcase
  labels:
    app: keycloak
spec:
  # hostname is left blank — OpenShift auto-generates based on cluster domain
  to:
    kind: Service
    name: keycloak
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
