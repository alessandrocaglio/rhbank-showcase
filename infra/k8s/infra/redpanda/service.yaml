apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: showcase
  labels:
    app: redpanda
spec:
  type: ClusterIP
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: schema-registry
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: admin
      port: 9644
      targetPort: 9644
      protocol: TCP
