apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: showcase
  labels:
    app: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
          imagePullPolicy: IfNotPresent
          command:
            - redpanda
            - start
            - --mode
            - dev-container
            - --kafka-addr
            - plaintext://0.0.0.0:9092
            - --advertise-kafka-addr
            - plaintext://redpanda:9092
            - --schema-registry-addr
            - http://0.0.0.0:8081
            - --rpc-addr
            - redpanda:33145
            - --advertise-rpc-addr
            - redpanda:33145
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
            - name: schema-registry
              containerPort: 8081
              protocol: TCP
            - name: admin
              containerPort: 9644
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - rpk
                - cluster
                - health
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
