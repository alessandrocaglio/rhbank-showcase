apiVersion: v1
kind: Service
metadata:
  name: account-verifier
  namespace: {{ .Values.namespace }}
  labels:
    app: account-verifier
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  type: ClusterIP
  selector:
    app: account-verifier
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
    - name: http
      port: 8080
      targetPort: 8080
