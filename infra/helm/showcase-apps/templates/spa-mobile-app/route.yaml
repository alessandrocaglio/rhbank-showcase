apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: spa-mobile-app
  namespace: {{ .Values.namespace }}
  labels:
    app: spa-mobile-app
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  host: spa-mobile-app.{{ .Values.clusterDomain }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: spa-mobile-app
  port:
    targetPort: http
