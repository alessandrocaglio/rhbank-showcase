apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: payment-gateway
    app.kubernetes.io/name: payment-gateway
    app.kubernetes.io/version: {{ .Values.images.tag | quote }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
        app.kubernetes.io/name: payment-gateway
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: payment-gateway
          image: {{ .Values.images.registry }}/payment-gateway:{{ .Values.images.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- include "showcase.otelEnv" (dict "root" . "serviceName" "payment-gateway") | nindent 12 }}
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              value: {{ .Values.kafka.consumerGroups.paymentGateway | quote }}
            - name: APP_KAFKA_TOPICS_PAYMENT_COMPLETED
              value: {{ .Values.kafka.topics.paymentCompleted | quote }}
            - name: APP_KAFKA_TOPICS_PAYMENT_COMPLETED_DLT
              value: {{ .Values.kafka.topics.paymentCompletedDlt | quote }}
            - name: GRPC_CLIENT_ACCOUNT_VERIFIER_ADDRESS
              value: {{ .Values.grpc.accountVerifier.address | quote }}
            - name: GRPC_CLIENT_ACCOUNT_VERIFIER_NEGOTIATION_TYPE
              value: "plaintext"
            - name: GRPC_ACCOUNT_VERIFIER_TIMEOUT_SECONDS
              value: {{ .Values.grpc.accountVerifier.timeoutSeconds | quote }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: {{ include "showcase.keycloakIssuerUri" . | quote }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: {{ include "showcase.keycloakJwkSetUri" . | quote }}
            - name: APP_CORS_ALLOWED_ORIGINS
              value: {{ include "showcase.corsOrigins" . | quote }}
            - name: SERVER_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources.paymentGateway | nindent 12 }}
