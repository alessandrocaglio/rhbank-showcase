apiVersion: v2
name: showcase-infra
description: Infrastructure for the observability showcase (PostgreSQL, Keycloak, IBM MQ, Redpanda)
type: application
version: 1.0.0
appVersion: "1.0.0"
# NOTE: Run `helm dependency update infra/helm/showcase-infra` before `helm install`
# to download the Redpanda subchart from https://charts.redpanda.com
dependencies:
  - name: redpanda
    version: "5.9.19"
    repository: https://charts.redpanda.com
    condition: redpanda.enabled
