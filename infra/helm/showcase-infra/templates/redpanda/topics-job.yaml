apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-topic-init
  namespace: {{ .Values.namespace }}
  labels:
    app: topic-init
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-redpanda
          image: {{ .Values.redpanda.topicsJob.image }}
          imagePullPolicy: {{ .Values.redpanda.topicsJob.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              until rpk cluster health --brokers {{ .Release.Name }}-redpanda:9092; do
                echo "Waiting for Redpanda..."; sleep 5
              done
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
      containers:
        - name: topic-init
          image: {{ .Values.redpanda.topicsJob.image }}
          imagePullPolicy: {{ .Values.redpanda.topicsJob.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              rpk topic create {{ .Values.redpanda.topics.paymentApproved }} --partitions 3 --replicas 1 --brokers {{ .Release.Name }}-redpanda:9092 || true
              rpk topic create {{ .Values.redpanda.topics.paymentCompleted }} --partitions 3 --replicas 1 --brokers {{ .Release.Name }}-redpanda:9092 || true
              rpk topic create {{ .Values.redpanda.topics.paymentApprovedDlt }} --partitions 1 --replicas 1 --brokers {{ .Release.Name }}-redpanda:9092 || true
              rpk topic create {{ .Values.redpanda.topics.paymentCompletedDlt }} --partitions 1 --replicas 1 --brokers {{ .Release.Name }}-redpanda:9092 || true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
