apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: {{ .Values.postgres.superuserPassword }}
  POSTGRES_DB: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app-secret
  namespace: {{ .Values.namespace }}
  labels:
    app: postgres
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
stringData:
  username: {{ .Values.postgres.appUsername }}
  password: {{ .Values.postgres.appPassword }}
