quarkus.http.port=${QUARKUS_HTTP_PORT:8080}

# IBM MQ connection
clearing.mq.host=${IBM_MQ_HOST:localhost}
clearing.mq.port=${IBM_MQ_PORT:1414}
clearing.mq.queue-manager=${IBM_MQ_QUEUE_MANAGER:QM1}
clearing.mq.channel=${IBM_MQ_CHANNEL:DEV.APP.SVRCONN}
clearing.mq.queue-name=${IBM_MQ_QUEUE_NAME:DEV.QUEUE.CLEARING}
clearing.mq.user=${IBM_MQ_USER:}
clearing.mq.password=${IBM_MQ_PASSWORD:}

# Kafka
mp.messaging.outgoing.payment-completed.connector=smallrye-kafka
mp.messaging.outgoing.payment-completed.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.outgoing.payment-completed.topic=${KAFKA_TOPIC_PAYMENT_COMPLETED:payment-completed}
mp.messaging.outgoing.payment-completed.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Clearing simulation — zero delay in tests so ClearingServiceTest runs in ms not seconds
%test.clearing.simulation.delay-ms.min=0
%test.clearing.simulation.delay-ms.max=0

# Dead-letter topic for failed payment-completed emissions
mp.messaging.outgoing.payment-completed-dead-letter.connector=smallrye-kafka
mp.messaging.outgoing.payment-completed-dead-letter.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.outgoing.payment-completed-dead-letter.topic=${KAFKA_TOPIC_PAYMENT_COMPLETED_DLT:payment-completed.DLT}
mp.messaging.outgoing.payment-completed-dead-letter.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Test profile — disable DevServices, use no-op MQ; random port avoids conflict with host services
quarkus.http.test-port=0
%test.quarkus.devservices.enabled=false
%test.quarkus.kafka.devservices.enabled=false
%test.mp.messaging.outgoing.payment-completed.bootstrap.servers=localhost:9092
%test.clearing.mq.user=test-user
%test.clearing.mq.password=test-password

# Test — use in-memory connector so no real Kafka needed
%test.mp.messaging.outgoing.payment-completed.connector=smallrye-in-memory
%test.mp.messaging.outgoing.payment-completed.merge=true
