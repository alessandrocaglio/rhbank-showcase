quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/accounts_db}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:appuser}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:apppassword}
quarkus.flyway.migrate-at-start=true
quarkus.grpc.server.port=${QUARKUS_GRPC_SERVER_PORT:9090}
quarkus.http.port=${QUARKUS_HTTP_PORT:8080}

# Kafka
mp.messaging.outgoing.payment-approved.connector=smallrye-kafka
mp.messaging.outgoing.payment-approved.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.outgoing.payment-approved.topic=${KAFKA_TOPIC_PAYMENT_APPROVED:payment-approved}
mp.messaging.outgoing.payment-approved.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Dead-letter channel
mp.messaging.outgoing.payment-approved-dead-letter.connector=smallrye-kafka
mp.messaging.outgoing.payment-approved-dead-letter.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.outgoing.payment-approved-dead-letter.topic=${KAFKA_TOPIC_PAYMENT_APPROVED_DLT:payment-approved.DLT}
mp.messaging.outgoing.payment-approved-dead-letter.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Test profile — use H2 in-memory
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.clean-at-start=true
# Disable Kafka DevServices in tests (no Docker available in CI)
%test.quarkus.devservices.enabled=false
%test.quarkus.kafka.devservices.enabled=false
# Use in-memory connector so no real Kafka needed in tests
%test.mp.messaging.outgoing.payment-approved.connector=smallrye-in-memory
%test.mp.messaging.outgoing.payment-approved.merge=true
